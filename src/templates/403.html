{% extends 'base.html' %}
{% block title %}403 — Forbidden{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="mc-card p-12 max-w-md text-center">
        <div class="text-8xl font-bold mb-4"
            style="font-family:'Sora',sans-serif; background:linear-gradient(135deg,#EF4444,#F5A623); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;">
            403</div>
        <h1 class="text-2xl font-bold mb-3" style="font-family:'Sora',sans-serif;">Access Denied</h1>
        <p class="mb-6" style="color:#4A6785;">You don't have permission to view this page. Please make sure you're
            signed into the correct account type.</p>
        <div class="flex flex-col gap-3">
            <a href="/dashboard/" class="btn-primary justify-center"><i class="fa-solid fa-grid-2"></i> Go to
                Dashboard</a>
            <a href="/" class="btn-secondary justify-center"><i class="fa-solid fa-house"></i> Home</a>
        </div>
    </div>
</div>
{% endblock %}
